# Review Check — Ensure Rex reviewed the latest commit
# Copy this to .github/workflows/review-check.yml in your project.
#
# Purpose: prevent merging code that was pushed after the last review.

name: Review Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: read
  contents: read

jobs:
  check-review:
    name: Verify Rex Review
    runs-on: ubuntu-latest

    steps:
      - name: Check if Rex reviewed latest commit
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr?.number || context.payload.review?.pull_request?.number;

            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            // Get PR details including the latest commit
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const latestCommit = pullRequest.head.sha;
            console.log(`Latest commit: ${latestCommit}`);

            // Get all reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Find Rex reviews (contain "Code Reviewer Agent" or "Reviewed by Rex")
            const rexReviews = reviews.filter(r =>
              r.body && (
                r.body.includes('Code Reviewer Agent') ||
                r.body.includes('Reviewed by Rex')
              )
            );

            if (rexReviews.length === 0) {
              core.setFailed('❌ No Rex review found. Please run the Code Reviewer Agent before merge.');
              return;
            }

            const latestCommitShort = latestCommit.substring(0, 7);
            const rexReviewedLatest = rexReviews.some(r =>
              r.body.includes(latestCommit) ||
              r.body.includes(latestCommitShort) ||
              r.commit_id === latestCommit
            );

            // Also check review comments for commit reference
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const rexCommentOnLatest = comments.some(c =>
              (c.body.includes('Code Reviewer Agent') || c.body.includes('Reviewed by Rex')) &&
              (c.body.includes(latestCommit) || c.body.includes(latestCommitShort))
            );

            if (rexReviewedLatest || rexCommentOnLatest) {
              console.log(`✅ Rex has reviewed the latest commit: ${latestCommitShort}`);

              await core.summary
                .addHeading('Rex Review Check')
                .addRaw(`✅ Latest commit \`${latestCommitShort}\` has been reviewed by Rex`)
                .write();
            } else {
              const lastRexReview = rexReviews[rexReviews.length - 1];
              const reviewedCommit = lastRexReview.commit_id?.substring(0, 7) || 'unknown';

              core.setFailed(
                `❌ Rex's last review was on commit \`${reviewedCommit}\`, ` +
                `but the latest commit is \`${latestCommitShort}\`.\n\n` +
                `Please run the Code Reviewer Agent on the latest commit before merge.`
              );

              await core.summary
                .addHeading('Rex Review Check')
                .addRaw(`❌ **Review Mismatch**\n\n`)
                .addRaw(`- Rex last reviewed: \`${reviewedCommit}\`\n`)
                .addRaw(`- Latest commit:     \`${latestCommitShort}\`\n\n`)
                .addRaw(`**Action Required**: Run Rex (Code Reviewer Agent) on the latest commit.`)
                .write();
            }
