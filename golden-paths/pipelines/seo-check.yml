# SEO Check Pipeline — SEO Check Agent
# Copy this to .github/workflows/seo-check.yml in your project.
#
# Agent: SEO Check (SEO Optimizer)
# Trigger: on content file changes (blog posts, landing pages, docs)
# Purpose: automated SEO analysis before publishing content

name: SEO Check

on:
  pull_request:
    paths:
      - 'content/**'
      - 'blog/**'
      - 'docs/**'
      - 'pages/**'
      - 'app/**/page.tsx'
      - 'app/**/page.mdx'
      - '**/*.mdx'
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'blog/**'
      - 'docs/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  seo-check:
    name: SEO Check SEO Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            content/**
            blog/**
            docs/**
            pages/**
            **/*.mdx
            **/*.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install analysis tools
        run: |
          npm install -g readability-scores markdown-link-check

      - name: Analyze content files
        id: seo-analysis
        run: |
          mkdir -p seo-reports

          TOTAL_SCORE=0
          FILE_COUNT=0
          ISSUES=""

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == *.md || "$file" == *.mdx ]]; then
              echo "Analyzing: $file"
              FILE_COUNT=$((FILE_COUNT + 1))

              CONTENT=$(sed '1{/^---$/!q;};1,/^---$/d' "$file")
              WORD_COUNT=$(echo "$CONTENT" | wc -w)

              H1_COUNT=$(grep -c "^# " "$file" || echo "0")
              HAS_DESCRIPTION=$(grep -c "^description:" "$file" || echo "0")
              H2_COUNT=$(grep -c "^## " "$file" || echo "0")

              IMAGES=$(grep -c "!\[" "$file" || echo "0")
              IMAGES_NO_ALT=$(grep -c "!\[\]" "$file" || echo "0")

              INTERNAL_LINKS=$(grep -oE '\[.*\]\(/[^)]+\)' "$file" | wc -l || echo "0")
              EXTERNAL_LINKS=$(grep -oE '\[.*\]\(https?://[^)]+\)' "$file" | wc -l || echo "0")

              SCORE=0

              # Title (20 points)
              if [ "$H1_COUNT" -eq 1 ]; then
                SCORE=$((SCORE + 20))
              elif [ "$H1_COUNT" -eq 0 ]; then
                ISSUES="$ISSUES\n- $file: Missing H1 title"
              else
                ISSUES="$ISSUES\n- $file: Multiple H1 titles (should be exactly 1)"
              fi

              # Meta description (15 points)
              if [ "$HAS_DESCRIPTION" -gt 0 ]; then
                SCORE=$((SCORE + 15))
              else
                ISSUES="$ISSUES\n- $file: Missing meta description in frontmatter"
              fi

              # Content length (20 points)
              if [ "$WORD_COUNT" -ge 1000 ]; then
                SCORE=$((SCORE + 20))
              elif [ "$WORD_COUNT" -ge 500 ]; then
                SCORE=$((SCORE + 10))
                ISSUES="$ISSUES\n- $file: Content is short ($WORD_COUNT words, recommend 1000+)"
              else
                ISSUES="$ISSUES\n- $file: Content too short ($WORD_COUNT words)"
              fi

              # Headings structure (15 points)
              if [ "$H2_COUNT" -ge 2 ]; then
                SCORE=$((SCORE + 15))
              elif [ "$H2_COUNT" -ge 1 ]; then
                SCORE=$((SCORE + 8))
                ISSUES="$ISSUES\n- $file: Add more H2 subheadings for better structure"
              else
                ISSUES="$ISSUES\n- $file: No H2 headings found"
              fi

              # Images (10 points)
              if [ "$IMAGES" -gt 0 ] && [ "$IMAGES_NO_ALT" -eq 0 ]; then
                SCORE=$((SCORE + 10))
              elif [ "$IMAGES_NO_ALT" -gt 0 ]; then
                ISSUES="$ISSUES\n- $file: $IMAGES_NO_ALT images missing alt text"
              fi

              # Internal links (10 points)
              if [ "$INTERNAL_LINKS" -ge 3 ]; then
                SCORE=$((SCORE + 10))
              elif [ "$INTERNAL_LINKS" -ge 1 ]; then
                SCORE=$((SCORE + 5))
                ISSUES="$ISSUES\n- $file: Add more internal links (found $INTERNAL_LINKS)"
              else
                ISSUES="$ISSUES\n- $file: No internal links found"
              fi

              # External links (10 points)
              if [ "$EXTERNAL_LINKS" -ge 1 ]; then
                SCORE=$((SCORE + 10))
              else
                ISSUES="$ISSUES\n- $file: Consider adding external links to authoritative sources"
              fi

              TOTAL_SCORE=$((TOTAL_SCORE + SCORE))

              echo "  Score: $SCORE/100"
              echo "  Words: $WORD_COUNT"
            fi
          done

          if [ "$FILE_COUNT" -gt 0 ]; then
            AVG_SCORE=$((TOTAL_SCORE / FILE_COUNT))
          else
            AVG_SCORE=0
          fi

          echo "avg_score=$AVG_SCORE" >> $GITHUB_OUTPUT
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo -e "$ISSUES" > seo-reports/issues.txt

      - name: Generate Summary
        run: |
          AVG_SCORE=${{ steps.seo-analysis.outputs.avg_score }}
          FILE_COUNT=${{ steps.seo-analysis.outputs.file_count }}

          if [ "$AVG_SCORE" -ge 90 ]; then
            STATUS="🟢 Excellent"
          elif [ "$AVG_SCORE" -ge 70 ]; then
            STATUS="🟡 Good"
          elif [ "$AVG_SCORE" -ge 50 ]; then
            STATUS="🟠 Needs Work"
          else
            STATUS="🔴 Poor"
          fi

          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 📈 SEO Check SEO Analysis Report

          **Files Analyzed**: $FILE_COUNT
          **Average SEO Score**: $AVG_SCORE/100
          **Status**: $STATUS

          ## Score Breakdown

          | Element | Points | Description |
          |---------|--------|-------------|
          | Title (H1) | 20 | Single H1 with primary keyword |
          | Meta Description | 15 | Compelling description in frontmatter |
          | Content Length | 20 | 1000+ words recommended |
          | Heading Structure | 15 | Logical H2/H3 hierarchy |
          | Images | 10 | All images have alt text |
          | Internal Links | 10 | 3+ internal links |
          | External Links | 10 | Links to authoritative sources |

          ## Issues Found

          \`\`\`
          $(cat seo-reports/issues.txt)
          \`\`\`

          ---
          *Analyzed by SEO Check (SEO Optimizer Agent)*
          EOF

      - name: Post SEO Review Comment
        if: github.event_name == 'pull_request' && steps.seo-analysis.outputs.file_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const avgScore = '${{ steps.seo-analysis.outputs.avg_score }}';
            const fileCount = '${{ steps.seo-analysis.outputs.file_count }}';

            let status, recommendation;
            if (avgScore >= 90) {
              status = '🟢 Excellent';
              recommendation = 'Content is well optimized for search engines!';
            } else if (avgScore >= 70) {
              status = '🟡 Good';
              recommendation = 'Consider addressing the minor issues below for better SEO.';
            } else if (avgScore >= 50) {
              status = '🟠 Needs Work';
              recommendation = 'Please address the SEO issues before publishing.';
            } else {
              status = '🔴 Poor';
              recommendation = 'Significant SEO improvements needed. Please review and fix.';
            }

            const body = `## 📈 SEO Check SEO Analysis

            **Files Analyzed**: ${fileCount}
            **Average Score**: ${avgScore}/100
            **Status**: ${status}

            ${recommendation}

            ### SEO Checklist

            - [ ] Single H1 title with primary keyword
            - [ ] Meta description (150-160 characters)
            - [ ] Content length (1000+ words for blog posts)
            - [ ] Logical heading hierarchy (H1 → H2 → H3)
            - [ ] All images have descriptive alt text
            - [ ] 3+ internal links to related content
            - [ ] External links to authoritative sources

            ---
            *Analyzed by SEO Check (SEO Optimizer Agent)*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('SEO Check SEO Analysis')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Check threshold
        if: steps.seo-analysis.outputs.avg_score < 50 && steps.seo-analysis.outputs.file_count > 0
        run: |
          echo "::warning::SEO score is below 50. Consider improving content before publishing."
          # Uncomment the line below to make this a hard failure
          # exit 1
